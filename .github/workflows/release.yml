# Release Workflow — Kung Commit VS Code Extension
#
# Triggered automatically when CI pushes a tag matching v*, or manually via
# workflow_dispatch with an existing tag. Builds the extension and creates a
# GitHub Release with the .vsix artifact attached.
#
# Manual trigger:
#   gh workflow run release.yml -f tag=v0.1.1423
#
# This workflow uses the default GITHUB_TOKEN (no PAT needed) because it does
# not push commits or tags — it only creates a Release. The CI workflow uses a
# fine-grained PAT with "Contents" (Read and Write) permissions for tag pushing.

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g., v0.1.1423)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Build ────────────────────────────────────────────────────────
      - name: Build extension
        run: npm run compile

      # ── Package ──────────────────────────────────────────────────────
      - name: Package extension (.vsix)
        run: npm run package

      # ── Version from tag ─────────────────────────────────────────────
      - name: Extract version from tag
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"           >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "tag=$TAG  version=$VERSION"

      # ── Release notes ────────────────────────────────────────────────
      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          # Find the previous v* tag (sorted by creation date)
          PREV_TAG=$(git tag --sort=-creatordate | grep '^v' | head -2 | tail -1)
          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$TAG" ]; then
            echo "Generating changelog from $PREV_TAG to $TAG"
            NOTES=$(git log "$PREV_TAG..$TAG" --pretty=format:"- %s %h" --no-merges)
          else
            echo "First release or no previous tag — using last 20 commits"
            NOTES=$(git log --pretty=format:"- %s %h" --no-merges --max-count=20)
          fi
          [ -z "$NOTES" ] && NOTES="- Initial release"

          # Use heredoc with random delimiter for safety
          DELIM="EOF_$(openssl rand -hex 8)"
          echo "notes<<$DELIM"     >> "$GITHUB_OUTPUT"
          echo "$NOTES"             >> "$GITHUB_OUTPUT"
          echo "$DELIM"             >> "$GITHUB_OUTPUT"

      # ── Create GitHub Release ────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Kung Commit v${{ steps.meta.outputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          files: ./*.vsix
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
