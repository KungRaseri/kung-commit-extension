# CI — Build, Package & Tag
#
# Triggered on push to main. Builds the VS Code extension, packages it as a .vsix,
# and creates a version tag. The tag push triggers the Release workflow.
#
# IMPORTANT: Requires a PAT_TOKEN secret — a fine-grained personal access token
# (Settings → Developer settings → Fine-grained tokens) with "Contents" repository
# permissions set to "Read and Write". Store it as a repository secret at
# Settings → Secrets and variables → Actions with name PAT_TOKEN.
# The default GITHUB_TOKEN cannot trigger downstream workflows, but a PAT can.
#
# Version format: [major].[minor].[build]
#   - [major].[minor]           from package.json (manually incremented by developer)
#   - [build]                   total number of commits in the repository
#   - Tag: v0.1.1234
#
# Manual trigger:
#   gh workflow run ci.yml --ref main

name: CI - Build and Package

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  build-and-package:
    name: Build and Package
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        # Use PAT so subsequent git operations (commit push, tag push) work
        # with the same token. Falls back to GITHUB_TOKEN if PAT is not set.
        token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: npm

    - name: Install dependencies
      run: npm ci

    # ── Version computation ──────────────────────────────────────────
    - name: Compute version
      id: version
      run: |
        # Read version from package.json (e.g., "0.1.10")
        PKG_VERSION=$(node -p "require('./package.json').version")

        # Count total commits in the repository
        TOTAL_COMMITS=$(git rev-list --count HEAD)

        # Strip the patch segment to get major.minor (e.g., "0.1.10" → "0.1")
        MAJOR_MINOR="${PKG_VERSION%.*}"

        # Build the final version: [major].[minor].[total_commits]
        # e.g., 0.1.1423
        VERSION="${MAJOR_MINOR}.${TOTAL_COMMITS}"

        echo "pkg-version=$PKG_VERSION"     >> "$GITHUB_OUTPUT"
        echo "total-commits=$TOTAL_COMMITS"  >> "$GITHUB_OUTPUT"
        echo "version=$VERSION"              >> "$GITHUB_OUTPUT"
        echo "tag=v${VERSION}"               >> "$GITHUB_OUTPUT"
        echo ""
        echo "package.json version: $PKG_VERSION"
        echo "total commits:        $TOTAL_COMMITS"
        echo "computed version:     $VERSION"
        echo "tag:                  v${VERSION}"

    # ── Build ────────────────────────────────────────────────────────
    - name: Build extension
      run: npm run compile

    # ── Package ──────────────────────────────────────────────────────
    - name: Package extension (.vsix)
      run: npm run package

    # ── Upload artifact ──────────────────────────────────────────────
    - name: Upload VSIX artifact
      uses: actions/upload-artifact@v4
      with:
        name: kung-commit-${{ steps.version.outputs.version }}
        path: ./*.vsix
        retention-days: 1

    # ── Tag ──────────────────────────────────────────────────────────
    - name: Check if tag already exists
      id: tag-check
      run: |
        TAG="${{ steps.version.outputs.tag }}"
        if git tag -l "$TAG" | grep -q .; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
          echo "Tag $TAG already exists — skipping creation."
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Create git tag
      if: steps.tag-check.outputs.exists == 'false'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag "${{ steps.version.outputs.tag }}" ${{ github.sha }}
        echo "Created tag: ${{ steps.version.outputs.tag }}"

    - name: Push git tag
      if: steps.tag-check.outputs.exists == 'false'
      env:
        GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
      run: |
        git push origin "${{ steps.version.outputs.tag }}"
        echo "Pushed tag: ${{ steps.version.outputs.tag }}"
